name: CI/CD Todo List

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-test:
    # Spécification de l'environnement d'exécution pour ce job
    # Ici, nous utilisons la dernière version d'Ubuntu disponible sur GitHub Actions
    # Cela garantit que nous avons un environnement propre et à jour pour exécuter nos tests et notre build
    runs-on: ubuntu-latest 

    # Définition des étapes à exécuter dans ce job
    steps: 
      # Première étape : Checkout du code source
      # Cette étape utilise l'action officielle de GitHub pour récupérer le code de notre dépôt
      # C'est une étape essentielle pour que les étapes suivantes puissent accéder au code de notre projet
      - uses: actions/checkout@v4

      # Test Backend
      # Nous configurons Python pour exécuter les tests de notre backend Django
      # L'action setup-python nous permet de spécifier la version de Python que nous voulons utiliser
      # Ensuite, nous naviguons dans le répertoire Backend, installons les dépendances et exécutons les tests avec manage.py
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Test Backend
        run: |
          cd Backend
          pip install -r requirements.txt
          python manage.py test

      # Build Frontend
      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: './Frontend/package-lock.json'
      - name: Install and Build
        run: |
          cd Frontend
          npm install
          npm run build

      # Nouveau : Déploiement propre avec l'Action dédiée
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./Frontend/dist # C'est ici que Vite génère les fichiers
